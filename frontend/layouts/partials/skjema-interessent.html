<div class="form-container" id="interesseskjema">
    <h2 style="margin-top: 0;">Interessert i {{ .Params.brand }} {{ .Title }}?</h2>
    <p>Fyll ut skjemaet under, så kontakter vi deg med et uforpliktende tilbud på denne bilen.</p>
    
    <form action="https://usebasin.com/f/81664e07f373" method="POST">
        <input type="hidden" name="side_kilde" value="{{ .Title }}">
        <input type="hidden" name="url_kilde" value="{{ .Permalink }}">
        <input type="hidden" name="_next" value="{{ "/takk/" | absURL }}">

        <div pricing>
            <label>Velg prisalternativ:</label>
            <div>
                <label>
                    <input type="radio" name="pris_valg" value="pris-0-innskudd" checked>
                    <span style="font-weight: bold;">{{ with .Params.price0 }}</span>
                    <span style="font-size: 0.9em; color: #555;">Fra kr {{ . }},- mnd.</span>
                    {{ end }}
                </label>
            </div>
        </div>

        <div choices>
            <h4>Ønskede tilvalg:</h4>
            <div>
                <label><input type="checkbox" name="tilvalg_dekor" value="ja"> Bildekor</label>
                <label><input type="checkbox" name="tilvalg_kjorebok" value="ja"> Kjørebok digital</label>
                <label><input type="checkbox" name="tilvalg_forsikring" value="ja"> Forsikring</label>
                <label><input type="checkbox" name="tilvalg_service" value="ja"> Serviceavtale</label>
                <label><input type="checkbox" name="tilvalg_dekkhotell" value="ja"> Dekkhotell</label>
                <label><input type="checkbox" name="tilvalg_bombrikke" value="ja"> Bombrikke</label>
            </div>
        </div>

        <div names>
            <input type="text" name="fornavn" placeholder="Fornavn *" required>
            <input type="text" name="etternavn" placeholder="Etternavn *" required>
        </div>
        
        <div contact>
            <input type="tel" name="telefon" placeholder="Telefonnummer *" required>
            <input type="email" name="email" placeholder="E-post *" required>
        </div>

        <input type="text" name="id_nummer" placeholder="Personnummer / Orgnummer *" required>
        
        <textarea name="melding" placeholder="Eventuelle spørsmål eller spesielle ønsker..."></textarea>

        <div acceptance>
            <label>
                <input type="checkbox" name="godkjenn_nyhetsbrev" required>
                <span>Jeg godtar å bli kontaktet vedrørende dette tilbudet og samtykker til utsendelse av nyhetsbrev. *</span>
            </label>
        </div>

        <button type="submit">Send uforpliktende forespørsel</button>
    </form>
</div>
