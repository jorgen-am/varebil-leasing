{{ define "main" }}
<section style="padding: 60px 20px; max-width: 1200px; margin: 0 auto;">
    <h1 style="text-align: center; margin-bottom: 40px;">{{ .Title }}</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;">
        {{ range .Pages }}
        <div style="border: 1px solid #eee; border-radius: 15px; overflow: hidden; background: #fff; display: flex; flex-direction: column;">
            {{ if .Params.image }}
                <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; height: 200px; object-fit: cover;">
            {{ else }}
                <div style="width: 100%; height: 200px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; color: #ccc;">Ingen bilde</div>
            {{ end }}
            
            <div style="padding: 25px; flex-grow: 1;">
                <h3>{{ .Title }}</h3>
                <p style="color: #666; font-size: 0.9em; line-height: 1.5;">{{ .Params.metadescription | truncate 120 }}</p>
                <a href="{{ .RelPermalink }}" style="display: inline-block; margin-top: 15px; font-weight: bold; color: #000;">Les mer &rarr;</a>
            </div>
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
