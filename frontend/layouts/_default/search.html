{{ define "main" }}
<section>
    <h1 style="text-align: center;">Søkeresultater for "<span id="search-query-text"></span>"</h1>
    
    <!-- Her lander resultatene -->
    <div id="full-search-results" class="grid-container">
        <p>Søker...</p>
    </div>
</section>

<script src="/js/fuse.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');
    document.getElementById('search-query-text').innerText = query;

    fetch('../index.json')
        .then(res => res.json())
        .then(data => {
            const fuse = new Fuse(data, { 
                keys: ['title', 'merke', 'modell'],
                threshold: 0.3 
            });
            
            const results = fuse.search(query);
            const container = document.getElementById('full-search-results');
            container.innerHTML = '';

            if (results.length === 0) {
                container.innerHTML = '<p>Ingen biler matchet søket ditt.</p>';
                return;
            }

            results.forEach(result => {
                const item = result.item;
                // Her bruker vi nøyaktig samme HTML-struktur som du har i list.html
                container.innerHTML += `
                    <div class="car-card" data-slug="{{ .Params.slug.current }}">
                        <!-- Bilens visuelle innhold -->
                        <a href="{{ .Permalink }}" class="car-card" 
                            data-slug="{{ .File.TranslationBaseName }}"
                            data-brand="{{ .Params.brand | lower | urlize }}"
                            data-model="{{ .Params.modeldescription | lower | urlize }}"
                            data-price="{{ .Params.price0 }}"
                            data-fuel="{{ .Params.fuel | lower | urlize }}"
                            data-gear="{{ .Params.gear | lower | urlize }}"
                            data-year="{{ .Params.yearmodel }}"
                            data-drive="{{ .Params.drive | lower | urlize }}"
                            data-range="{{ .Params.range }}"
                            data-interest="{{ .Params.interest }}" 
                            data-quote="{{ .Params.quote }}"
                            data-doors="{{ .Params.doors }}"
                            data-seats="{{ .Params.seats }}"
                            data-interior="{{ .Params.interior | urlize }}"
                            data-color="{{ .Params.color | urlize }}"
                            data-capacity="{{ .Params.capacity }}"
                            data-chargetime="{{ .Params.charging }}"
                            data-towbar="{{ with .Params.towbar }}{{ . }}{{ end }}"
                            data-fastdelivery="{{ with .Params.fastdelivery }}{{ . }}{{ end }}"
                            data-campaign="{{ with .Params.campaign }}{{ . }}{{ end }}">

                            <!-- Bilens visuelle innhold -->
                            <div href="" class="car-card-content">
                                <!-- Velg for sammenligning -->
                                <button class="select-btn" data-slug="{{ .File.TranslationBaseName }}" data-img="{{ .Params.mainImageUrl }}" onclick="toggleSelection(this.dataset.slug, this.dataset.img, event)"> </button>
                                <!-- Legg til som favoritt-->
                                <button class="favorite-btn" data-slug="{{ .File.TranslationBaseName }}" onclick="toggleFavorite(this.getAttribute('data-slug'), this, event)"> </button>

                                {{ if .Params.mainImageUrl }}
                                <img src="{{ .Params.mainImageUrl }}" alt="{{ .Title }}" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">
                                {{ end }}
                    
                                <h3>{{ .Params.brand }} {{ .Title }}</h3>
                                <p>{{ .Params.modeldescription }}</p>
                                
                                <!-- Oppdaterte tekniske felt (fuel, gear, drive) -->
                                <p>
                                    {{ if .Params.fuel }}<span>{{ .Params.fuel }}</span>{{ end }}
                                    {{ if .Params.drive }}<span>{{ .Params.drive }}</span>{{ end }}
                                    {{ if .Params.gear }}<span >{{ .Params.gear }}</span>{{ end }}
                                </p>

                                <!-- Prisvisning -->
                                <p class="price">
                                    {{ if .Params.price0 }}
                                        Fra kr {{ lang.FormatNumber 0 .Params.price0 }},- ink. mva
                                    {{ else }}
                                        Kontakt for pris
                                    {{ end }}
                                </p>

                                <div class="btn">Les mer</div>
                            </div>
                        </a>

                    </div>
                `;
            });
        });
});
</script>
{{ end }}
