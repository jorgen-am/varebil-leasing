{{ define "main" }}
<section>
    <h1 style="text-align: center;">Søkeresultater for "<span id="search-query-text"></span>"</h1>
    
    <!-- Her lander resultatene -->
    <div id="full-search-results" class="grid-container">
        <p>Søker...</p>
    </div>
</section>

<script src="/js/fuse.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q');
    document.getElementById('search-query-text').innerText = query;

    fetch('../index.json')
        .then(res => res.json())
        .then(data => {
            const fuse = new Fuse(data, { 
                keys: ['title', 'merke', 'modell'],
                threshold: 0.3 
            });
            
            const results = fuse.search(query);
            const container = document.getElementById('full-search-results');
            container.innerHTML = '';

            if (results.length === 0) {
                container.innerHTML = '<p>Ingen biler matchet søket ditt.</p>';
                return;
            }

            results.forEach(result => {
                const item = result.item;
                // Her bruker vi nøyaktig samme HTML-struktur som du har i list.html
                container.innerHTML += `
                    <div class="car-card" data-slug="{{ .Params.slug.current }}">
                        <!-- Bilens visuelle innhold -->
                        <div class="car-card-content">
                            <!-- Velg for sammenligning -->
                            <button class="select-btn" data-slug="{{ .File.TranslationBaseName }}" data-img="{{ .Params.mainImageUrl }}" onclick="toggleSelection(this.dataset.slug, this.dataset.img, event)"> </button>
                            <!-- Legg til som favoritt-->
                            <button class="favorite-btn" data-slug="{{ .File.TranslationBaseName }}" onclick="toggleFavorite(this.getAttribute('data-slug'), this)"> </button>
                            ${item.bilde ? `<img src="${item.bilde}" alt="${item.title}" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">` : ''}
                            <h3 style="margin: 10px 0 5px 0;">${item.merke} ${item.title}</h3>
                            <p style="color: #666; font-size: 0.9em; margin-bottom: 5px;">${item.modell}</p>
                            <p><strong>Fra kr ${item.pris},- mva</strong></p>
                            <a href="${item.permalink}" style="display: block; margin-top: 10px; padding: 10px; background: #000; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center;">
                                Se tilbud
                            </a>
                        </div>
                    </div>
                `;
            });
        });
});
</script>
{{ end }}
