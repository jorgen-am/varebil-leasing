{{ define "main" }}
<section style="padding: 80px 20px; max-width: 800px; margin: 0 auto;">
    <h1>{{ .Title }}</h1>
    <p>Her finner du en oversikt over alt innhold på {{ .Site.Title }}:</p>

    <ul style="line-height: 2; font-size: 1.1em; margin-top: 30px;">
        {{ range .Site.AllPages }}
        <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
        {{ end }}
    </ul>
</section>
{{ end }}
