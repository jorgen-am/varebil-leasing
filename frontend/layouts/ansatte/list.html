{{ define "main" }}
<section class="ansatte-list container">
    <h1>Våre rådgivere</h1>
    
    <div  class="column-container">
        {{ range .Pages }}
        <div style="text-align: center; border: 1px solid #eee; padding: 20px; border-radius: 10px;">
            <a href="{{ .RelPermalink }}" style="text-decoration: none; color: inherit;">
                {{ if .Params.image }}
                    <img src="{{ .Params.image }}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
                {{ else }}
                    <div style="width: 150px; height: 150px; border-radius: 50%; background: #eee; margin: 0 auto 15px;"></div>
                {{ end }}
                
                <h3>{{ .Title }}</h3>
                <p style="color: #007bff;">{{ .Params.position }}</p>
            </a>
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
